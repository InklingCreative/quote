<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- reset CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reset-css@3.0.0/reset.min.css" />

    <!-- google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Estonia&family=Italianno&family=Macondo+Swash+Caps&family=Meddon&family=UnifrakturMaguntia&display=swap" rel="stylesheet">

    <!-- external CSS -->
    <link rel="stylesheet" href="css/style.css" />

    <title>Quotes</title>
  </head>

  <body>
    <section id="Q1">
      <blockquote>
        <q>
          <span>Some say</span>
          <span>the world</span>
          <span>will end</span>
          <span>in <em class="fire">fire</em>,</span>
          <span>some say</span>
          <span>in <em class="ice">ice</em>.</span>
        </q>

        <cite class="sig">— Robert Frost</cite>
      </blockquote>

      <p class="credit"><em>Fire and Ice</em> (1923)</p>
    </section>

    <section id="Q2">
      <blockquote>
        <q>
          <span>If I couldn’t</span>
          <span><em class="forget">forget</em>,</span>
          <span>perhaps the</span>
          <span>solution was to</span>
          <span><em class="remember">remember</em></span>
        </q>
      </blockquote>

      <cite>Marina Nemat, <em>Prisoner of Tehran</em> (2007)</cite>
    </section>
  </body>
</html>
